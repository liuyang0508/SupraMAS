# Wukong AI Platform - Kubernetes Deployment
# 生产级K8s资源配置

apiVersion: v1
kind: Namespace
metadata:
  name: wukong-system
  labels:
    app: wukong
    env: production

---

# ===== ConfigMap =====
apiVersion: v1
kind: ConfigMap
metadata:
  name: wukong-config
  namespace: wukong-system
data:
  ENVIRONMENT: "production"
  LOG_LEVEL: "info"
  WORKERS: "4"
  CORS_ORIGINS: '["https://wukong.yourdomain.com"]'
  MILVUS_HOST: "milvus-service"
  MINIO_ENDPOINT: "minio-service:9000"
  RABBITMQ_URL: "amqp://admin:password@rabbitmq-service:5672/"

---

# ===== Secret (生产环境应使用外部Secret管理器) =====
apiVersion: v1
kind: Secret
metadata:
  name: wukong-secrets
  namespace: wukong-system
type: Opaque
stringData:
  DB_PASSWORD: "CHANGE_ME_STRONG_PASSWORD"
  JWT_SECRET_KEY: "CHANGE_ME_JWT_SECRET_MIN_32_CHARS"
  REDIS_PASSWORD: "CHANGE_ME_REDIS_PASSWORD"
  RABBITMQ_USER: "admin"
  RABBITMQ_PASS: "CHANGE_ME_RABBITMQ_PASS"
  MINIO_ACCESS_KEY: "MINIO_ACCESS_KEY"
  MINIO_SECRET_KEY: "MINIO_SECRET_KEY"

---

# ===== API Deployment =====
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wukong-api
  namespace: wukong-system
  labels:
    app: wukong-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: wukong-api
  template:
    metadata:
      labels:
        app: wukong-api
    spec:
      containers:
      - name: api
        image: wukong/wukong-api:v1.0.0
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: wukong-config
        - secretRef:
            name: wukong-secrets
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "2000m"
            memory: "2Gi"
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
        volumeMounts:
        - name: skill-storage
          mountPath: /app/data/skills
        - name: file-storage
          mountPath: /app/data/files
      volumes:
      - name: skill-storage
        persistentVolumeClaim:
          claimName: skill-pvc
      - name: file-storage
        persistentVolumeClaim:
          claim-name: file-pvc

---

# ===== API Service =====
apiVersion: v1
kind: Service
metadata:
  name: wukong-api-service
  namespace: wukong-system
spec:
  selector:
    app: wukong-api
  ports:
  - port: 8000
    targetPort: 8000
  type: ClusterIP

---

# ===== HPA (自动扩缩容) =====
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: wukong-hpa
  namespace: wukong-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: wukong-api
  minReplicas: 3
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

---

# ===== Ingress (Nginx) =====
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wukong-ingress
  namespace: wukong-system
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  tls:
  - hosts:
    - wukong.yourdomain.com
    secretName: wukong-tls-secret
  rules:
  - host: wukong.yourdomain.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: wukong-api-service
            port:
              number: 8000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80

---

# ===== PVC for Skills =====
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: skill-pvc
  namespace: wukong-system
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
  storageClassName: standard

---

# ===== PVC for Files =====
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: file-pvc
  namespace: wukong-system
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi
  storageClassName: standard
